<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — הדף לא נמצא | באשי קליין</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@600;700;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4ef; --surface: #fffefb; --ink: #211f1c; --muted: #76716a;
    --line: #e7e2d8; --accent: #b0512e; --accent-2: #97431f;
    --serif: "Frank Ruhl Libre", Georgia, serif;
    --sans: "Assistant", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink);
    min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px;
    -webkit-font-smoothing: antialiased; }
  .badge { width: 84px; height: 84px; border-radius: 22px; background: var(--accent); color: #fff;
    display: grid; place-items: center; margin: 0 auto 26px; box-shadow: 0 14px 30px rgba(176,81,46,.28); }
  .badge svg { width: 42px; height: 42px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .code { font-family: var(--serif); font-weight: 800; font-size: clamp(3rem, 12vw, 5rem); line-height: 1; color: var(--accent); }
  h1 { font-family: var(--serif); font-weight: 700; font-size: clamp(1.3rem, 4vw, 1.8rem); margin: 10px 0 8px; }
  p { color: var(--muted); max-width: 420px; margin: 0 auto 26px; }
  .btn { display: inline-flex; align-items: center; gap: 9px; padding: 13px 26px; border-radius: 999px;
    background: var(--accent); color: #fff; font-weight: 700; text-decoration: none;
    box-shadow: 0 12px 26px rgba(176,81,46,.22); transition: background .2s, transform .15s; }
  .btn:hover { background: var(--accent-2); transform: translateY(-2px); }
</style>
</head>
<body>
  <div>
    <div class="badge">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </div>
    <div class="code">404</div>
    <h1>הדף לא נמצא</h1>
    <p>נראה שהדף שחיפשת לא קיים, או שהקישור שגוי. בואו נחזור לדף הבית.</p>
    <a class="btn" href="/portfolio/">חזרה לדף הבית →</a>
  </div>
</body>
</html>
